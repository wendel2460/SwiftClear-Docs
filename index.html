                        <div class="space-y-6 text-gray-600 leading-relaxed text-lg bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                            <p><span class="text-4xl font-bold text-chmsu-green float-left mr-2 mt-[-8px]">T</span>he rapid advancement of information technology has significantly transformed administrative processes in higher education institutions, particularly in the automation of student services such as clearance systems. Traditionally, student clearance procedures are conducted manually, requiring students to physically visit multiple offices to secure signatures and complete requirements. However, recent studies highlight a growing trend toward the adoption of web-based and automated clearance systems to improve efficiency, accessibility, and data management.</p>
                            
                            <p>According to Cadiz et al. (2017), electronic clearance systems streamline the processing of student requirements, reduce costs associated with paper-based transactions, and enable centralized data handling. Similarly, Macuroy et al. (2023) emphasized that online student clearance systems provide faster and more accessible services while improving system reliability and usability. Furthermore, Essel et al. (2023) noted that manual clearance processes impose administrative burdens due to repetitive and time-consuming tasks. Hasan et al. (2023) also identified that digital platforms eliminate long queues and reduce physical congestion within campuses, while Adegoke and Olalekan (2026) highlighted the importance of workflow-driven systems in integrating multiple departments for real-time tracking of clearance status.</p>
                            
                            <p>These studies demonstrate that modern clearance systems are shifting toward automated, centralized, and web-based solutions to enhance operational efficiency and user experience. Despite these advancements, many institutions, including Carlos Hilado Memorial State University (CHMSU) Talisay Campus, still experience several challenges associated with traditional clearance systems.</p>
                            
                            <div class="bg-orange-50 p-6 rounded-xl border-l-4 border-orange-500 my-8">
                                <h4 class="text-orange-800 font-semibold mb-2 flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation"></i> 1.1 Problem Statement</h4>
                                <p class="text-orange-900 text-base mb-3">The study identified several issues in the current student clearance process at CHMSU Talisay Campus:</p>
                                <ul class="list-disc list-inside text-orange-900 text-sm space-y-2">
                                    <li>The manual process requires students to physically move from one office to another, resulting in long queues and time-consuming procedures.</li>
                                    <li>Paper-based clearance forms are prone to loss, damage, or misplacement, which can delay processing.</li>
                                    <li>The availability of signatories often causes scheduling conflicts, forcing students to return multiple times.</li>
                                    <li>The lack of centralized monitoring makes it difficult to track clearance progress in real time.</li>
                                    <li>Manual systems increase administrative workload and are susceptible to human errors, inefficiencies, and inconsistencies.</li>
                                </ul>
                            </div>
                            
                            <p>To address these challenges, this study proposes the development of <strong>SwiftClear: An Automated Web-Based Student Clearance System for CHMSU Talisay Campus</strong>, designed to streamline and digitize the entire clearance process. The system integrates key university offices, including the Registrar, Business Office, Library, and College Dean, into a centralized platform that enables real-time monitoring, automated workflow routing, and secure data management. By eliminating the need for physical forms and manual routing, the proposed system reduces processing time, minimizes errors, and enhances accessibility for both students and administrators.</p>

                `

                    <div class="fade-in">

                            <h2 class="text-3xl font-bold text-gray-800">1.3 Scope and Limitations</h2>

                                    <i class="fa-solid fa-compress text-chmsu-gold"></i> Scope of the Study

                                    <p>This study focuses on the design and development of SwiftClear: An Automated Web-Based Student Clearance System for CHMSU Talisay Campus. The system is intended to streamline the clearance process by providing a centralized digital platform for students and authorized university personnel.</p>
                                    <p>The system is designed specifically for enrolled and graduating students of CHMSU Talisay Campus who need to process their clearance, as well as authorized staff from key offices including the Registrar, Business Office, Library, and College Dean. It enables users to request, process, and monitor clearance status through an online platform without the use of physical paper forms.</p>
                                    <p>The developed system includes core functionalities such as user login and authentication, clearance request initiation, automated routing of clearance to different departments, real-time status tracking, and digital approval from each office. It also provides role-based access to ensure that only authorized personnel can approve or manage clearance requests.</p>

        // --- Application Logic ---
        
        // Initialize the UI
        function initApp() {
            renderNavMenu();
            // Default load the first section
            switchSection('cover');
        }

        // Render Sidebar Links
        function renderNavMenu() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = '';
            
            documentSections.forEach(section => {
                const btn = document.createElement('button');
                btn.id = `nav-btn-${section.id}`;
                btn.className = `w-full text-left px-6 py-3 text-sm font-medium transition-colors border-l-4 border-transparent hover:bg-white/10 hover:border-chmsu-gold flex items-center gap-3`;
                btn.onclick = () => switchSection(section.id);
                btn.innerHTML = `<i class="${section.icon} w-5 text-center opacity-70"></i> ${section.title}`;
                navMenu.appendChild(btn);
            });
        }

        // Switch displayed section
        function switchSection(id) {
            // Update Active Link styling
            documentSections.forEach(section => {
                const btn = document.getElementById(`nav-btn-${section.id}`);
                if (btn) {
                    if (section.id === id) {
                        btn.classList.add('bg-white/10', 'border-chmsu-gold', 'text-chmsu-gold');
                        btn.classList.remove('border-transparent', 'text-white');
                        btn.querySelector('i').classList.replace('opacity-70', 'opacity-100');
                    } else {
                        btn.classList.remove('bg-white/10', 'border-chmsu-gold', 'text-chmsu-gold');
                        btn.classList.add('border-transparent', 'text-white');
                        btn.querySelector('i').classList.replace('opacity-100', 'opacity-70');
                    }
                }
            });

            // Find section data and render content
            const sectionData = documentSections.find(s => s.id === id);
            if (sectionData) {
                const container = document.getElementById('content-container');
                container.innerHTML = sectionData.content;
                // Scroll to top of content area
                document.querySelector('main').scrollTop = 0;
            }

            // Close mobile menu if open
            if(window.innerWidth < 768) {
                closeMobileMenu();
            }
        }

        // Mobile Menu Toggle Functions
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                // Open
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                // Close
                closeMobileMenu();
            }
        }

        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
        }

        // Run setup when page loads
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
